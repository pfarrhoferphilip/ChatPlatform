<div class="min-h-screen flex items-center justify-center bg-[#030705] text-gray-200">

  <div class="w-full max-w-md bg-[#173330] border border-[#164b46] rounded-xl p-8 shadow-lg">

    <h1 class="text-2xl font-semibold text-white mb-6 text-center">
      Chat Login
    </h1>

    <form (ngSubmit)="login()" class="space-y-4">

      <div>
        <label class="block text-sm mb-1 text-gray-300">Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          class="w-full px-4 py-2 rounded-lg bg-[#030705] border border-[#164b46] outline-none focus:border-[#1e5e58] text-gray-200"
        />
      </div>

      <div>
        <label class="block text-sm mb-1 text-gray-300">Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          class="w-full px-4 py-2 rounded-lg bg-[#030705] border border-[#164b46] outline-none focus:border-[#1e5e58] text-gray-200"
        />
      </div>

      <button
        type="submit"
        class="w-full mt-2 bg-[#164b46] hover:bg-[#1e5e58] py-2 rounded-lg text-white font-medium">
        Login
      </button>

    </form>

    <div class="flex items-center my-6">
      <div class="flex-1 h-px bg-[#164b46]"></div>
      <span class="px-3 text-sm text-gray-400">or</span>
      <div class="flex-1 h-px bg-[#164b46]"></div>
    </div>

    <button
      (click)="register()"
      class="w-full border border-[#164b46] hover:bg-[#164b46] py-2 rounded-lg text-white font-medium">
      Create Account
    </button>

  </div>

</div>
