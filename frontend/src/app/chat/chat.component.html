<div class="flex h-screen bg-[#030705] text-gray-200">

  <div class="flex flex-col flex-1">

    <div class="h-14 flex items-center px-6 border-b border-[#173330] bg-[#164b46] font-semibold text-white">
      # general
    </div>

    <div class="flex-1 overflow-y-auto p-6 space-y-6">

      @for (message of messages; track message.id) {
        <div class="flex gap-3">
          <app-message [message]="message"></app-message>
        </div>
      }

    </div>

    <form (ngSubmit)="sendMessage()" class="p-4 border-t border-[#173330] bg-[#030705]">
      <div class="flex items-center bg-[#173330] rounded-lg px-4 py-2 border border-[#164b46]">
        <input
          type="text"
          name="message"
          [(ngModel)]="messageInput"
          placeholder="Message #general"
          class="flex-1 bg-transparent outline-none text-gray-200 placeholder-gray-400"
        />
        <button
          type="submit"
          class="ml-3 bg-[#164b46] hover:bg-[#1e5e58] px-4 py-1.5 rounded-md text-white text-sm font-medium">
          Send
        </button>
      </div>
    </form>

  </div>
</div>
